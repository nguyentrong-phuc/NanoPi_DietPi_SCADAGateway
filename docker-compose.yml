version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./config_data:/config_data
    # Required to apply IP configuration on host (NanoPi) if applicable:
    # network_mode: "host"
    # privileged: true

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
